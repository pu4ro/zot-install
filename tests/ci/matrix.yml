name: Zot Install CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Tier 1: Unit tests (fast, every commit)
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4
      - name: Install BATS
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo ln -s /tmp/bats/bin/bats /usr/local/bin/bats
          git clone --depth 1 https://github.com/bats-core/bats-support.git /opt/bats-support
          git clone --depth 1 https://github.com/bats-core/bats-assert.git /opt/bats-assert
      - name: Run unit tests
        run: bats tests/

  # Tier 2: Integration tests (Docker-in-Docker, every PR)
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Run integration tests
        run: bash tests/integration/run_integration.sh

  # Tier 2: Multi-OS testing
  multi-os:
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      matrix:
        image:
          - ubuntu:22.04
          - ubuntu:24.04
          - debian:12
          - rockylinux:9
    steps:
      - uses: actions/checkout@v4
      - name: Test on ${{ matrix.image }}
        run: |
          docker run --rm -v $PWD:/workspace -w /workspace ${{ matrix.image }} bash -c "
            apt-get update && apt-get install -y git openssl 2>/dev/null || \
            dnf install -y git openssl 2>/dev/null || true
            git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
            git clone --depth 1 https://github.com/bats-core/bats-support.git /opt/bats-support
            git clone --depth 1 https://github.com/bats-core/bats-assert.git /opt/bats-assert
            /tmp/bats/bin/bats tests/install/test_tls_generation.bats tests/install/test_os_detection.bats
          "
